<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인등기 비용 계산기 | 현재두 법무사</title>

<style>
body {
  font-family:'Noto Sans KR',sans-serif;
  margin:0;
  background:#f4f6f9;
}

.container {
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:15px;
  padding:25px;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h1,h2 {
  text-align:center;
  margin-bottom:15px;
}

/* 버튼 */
.btn {
  width:100%;
  height:50px;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.tel {background:#4a90e2;color:white;}
.kakao {background:#FEE500;color:#3c1e1e;}
.blog {background:#27ae60;color:white;}

/* 입력창 (핵심 정렬) */
input, select {
  width:100%;
  height:48px;
  padding:0 12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
  box-sizing:border-box;
  font-size:15px;
}

/* 결과 */
.result {
  font-size:20px;
  font-weight:bold;
  text-align:center;
  margin-top:15px;
  padding:15px;
  background:linear-gradient(135deg,#4a90e2,#357ABD);
  color:#fff;
  border-radius:12px;
}

.detail {
  margin-top:10px;
  font-size:14px;
  color:#555;
  line-height:1.6;
}

/* 플로팅 */
.floating {
  position:fixed;
  right:15px;
  bottom:90px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}

.float-btn {
  padding:12px 15px;
  border:none;
  border-radius:30px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.float-btn.tel {background:#4a90e2;color:#fff;}
.float-btn.kakao {background:#FEE500;color:#3c1e1e;}

/* 하단 고정 CTA */
.fixed-info {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #4a90e2, #357ABD);
  padding: 12px 25px;
  border-radius: 30px;
  z-index: 999;
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

.fixed-info a {
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>현재두 법무사 사무소</h1>
<p style="text-align:center;">법인등기 · 상속 · 증여</p>

<button class="btn tel" onclick="call()">📞 전화 상담</button> 
<button class="btn kakao" onclick="kakao()">💬 카카오톡 상담</button> 
<button class="btn blog" onclick="blog()">📝 블로그</button>
</div>

<div class="card">
<h2>법인등기 비용 계산기</h2>

<select id="type">
  <option value="법인설립">법인설립</option>
  <option value="자본금증자">자본금증자</option>
  <option value="상호변경">상호변경</option>
  <option value="목적변경">목적변경</option>
  <option value="임원변경">임원변경</option>
  <option value="본점주소이전_관내">본점주소이전 (관내)</option>
  <option value="본점주소이전_관외">본점주소이전 (관외)</option>
</select>

<select id="dense">
  <option value="false">비과밀지역</option>
  <option value="true">과밀지역 (3배)</option>
</select>

<input id="capital" placeholder="자본금 입력 (예: 50,000,000)">

<div class="result" id="total">총 비용: 0원</div>
<div class="detail" id="detail"></div>

</div>
</div>

<div class="floating">
  <button class="float-btn tel" onclick="call()">📞</button>
  <button class="float-btn kakao" onclick="kakao()">💬</button>
</div>

<div class="fixed-info">
📞 <a href="tel:0324251500">032-425-1500 상담하기</a>
</div>

<script>
function call(){ location.href="tel:0324251500"; }
function kakao(){ window.open("https://open.kakao.com/o/soZresni","_blank"); }
function blog(){ window.open("https://blog.naver.com/hjd21","_blank"); }

function format(n){return Math.round(n).toLocaleString()+"원"}

function calc(){
  let type = document.getElementById("type").value;
  let capital = parseFloat(document.getElementById("capital").value.replace(/,/g,''))||0;
  let dense = document.getElementById("dense").value==="true";

  let tax=0, edu=0, court=0, lawFee=0, lawVAT=0, stamp=0, extra=10000;
  let notar1=0, notar2=0;

  if(type === "법인설립" || type === "자본금증자" || (type==="본점주소이전_관외" && dense)){
    if(capital<=0){
      document.getElementById("total").innerText="자본금을 입력하세요";
      document.getElementById("detail").innerHTML="";
      return;
    }
    let base = Math.max(capital*0.004,112500);
    let multi = dense?3:1;

    tax = base*multi;
    edu = tax*0.2;
    court = (type==="법인설립"||type==="본점주소이전_관외") ? 35000 : 7000;
    lawFee = (type==="법인설립"||type==="자본금증자") ? 300000 : 150000;
    lawVAT = lawFee*0.1;
    stamp = (type==="법인설립"||type==="상호변경") ? 30000 : 0;

    if(type !== "법인설립"){
      notar1=30000; notar2=30000;
    }
  }
  else if(type==="본점주소이전_관내"){
    tax = 112500;
    edu = tax*0.2;
    court=7000;
    lawFee=150000;
    lawVAT=lawFee*0.1;
  }
  else{
    tax=40200;
    edu=tax*0.2;
    court=7000;
    lawFee=150000;
    lawVAT=lawFee*0.1;
    notar1=30000; notar2=30000;
  }

  let total = tax+edu+lawFee+lawVAT+court+stamp+notar1+notar2+extra;

  document.getElementById("total").innerText = "총 비용: "+format(total);

  document.getElementById("detail").innerHTML=`
  등록세: ${format(tax)}<br>
  교육세: ${format(edu)}<br>
  법무사: ${format(lawFee)}<br>
  부가세: ${format(lawVAT)}<br>
  공증대행: ${format(notar1)}<br>
  공증료: ${format(notar2)}<br>
  수수료: ${format(court)}<br>
  도장: ${format(stamp)}<br>
  제증명: ${format(extra)}
  `;
}

document.querySelectorAll("#type,#capital,#dense").forEach(el=>{
  el.addEventListener("input",calc);
  el.addEventListener("change",calc);
});

document.getElementById("capital").addEventListener("input",function(){
  let v=this.value.replace(/,/g,'');
  this.value=v.replace(/\B(?=(\d{3})+(?!\d))/g,",");
});

calc();
</script>

</body>
</html>
