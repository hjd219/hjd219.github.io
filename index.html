<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인등기 비용 계산기 | 현재두 법무사</title>

<style>
body {
  font-family:'Noto Sans KR',sans-serif;
  margin:0;
  background:#f4f7fb;
}

/* 상단 */
.header {
  background:#4a90e2;
  color:#fff;
  padding:30px 20px;
  text-align:center;
}

.header h1 {margin:0; font-size:24px;}
.header p {margin:5px 0 0; font-size:14px;}

.call-top {
  margin-top:15px;
  background:#fff;
  color:#4a90e2;
  padding:10px 20px;
  border-radius:25px;
  display:inline-block;
  cursor:pointer;
  font-weight:bold;
}

/* 컨텐츠 */
.wrap {
  max-width:520px;
  margin:30px auto;
  padding:0 15px;
}

/* 카드 */
.card {
  background:#fff;
  border-radius:15px;
  padding:25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* 계산기 */
h2 {
  text-align:center;
  margin-bottom:20px;
  color:#2c3e50;
}

label {
  font-weight:600;
  margin-top:15px;
  display:block;
}

select,input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

.result {
  margin-top:20px;
  padding:18px;
  background:linear-gradient(135deg,#4a90e2,#357ABD);
  color:#fff;
  border-radius:12px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.detail {
  margin-top:10px;
  font-size:14px;
  color:#555;
}

/* 버튼 */
.btn {
  margin-top:20px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#4a90e2;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

/* 서비스 설명 */
.service {
  font-size:14px;
  line-height:1.6;
  color:#444;
}

/* 하단 */
.footer {
  text-align:center;
  padding:20px;
  font-size:13px;
  color:#888;
}
</style>

</head>

<body>

<div class="header">
  <h1>현재두 법무사 사무소</h1>
  <p>법인등기 · 상속 전문</p>
  <div class="call-top" onclick="call()">📞 032-425-1500</div>
</div>

<div class="wrap">

<div class="card">
<h2>법인등기 비용 계산기</h2>

<label>등기 종류</label> <select id="type">

  <option value="법인설립">법인설립</option>
  <option value="자본금증자">자본금증자</option>
  <option value="상호변경">상호변경</option>
  <option value="목적변경">목적변경</option>
  <option value="임원변경">임원변경</option>
  <option value="본점주소이전_관내">본점주소이전 (관내)</option>
  <option value="본점주소이전_관외">본점주소이전 (관외)</option>
</select>

<label>자본금</label> <input id="capital" placeholder="예: 50,000,000">

<label>지역</label> <select id="dense">

  <option value="false">비과밀지역</option>
  <option value="true">과밀지역 (3배)</option>
</select>

<div class="result" id="total">총 비용: 0원</div>
<div class="detail" id="detail"></div>

<button class="btn" onclick="call()">📞 상담 바로 연결</button>

</div>

<div class="card">
<h2>서비스 안내</h2>
<div class="service">
✔ 법인설립 등기<br>
✔ 임원 변경 / 상호 변경<br>
✔ 본점 이전 (관내 / 관외)<br>
✔ 상속 / 부동산 등기<br><br>

👉 빠르고 정확한 등기 진행<br>
👉 전화 상담 즉시 안내 가능

</div>
</div>

</div>

<div class="footer">
현재두 법무사 사무소 | 032-425-1500
</div>

<script>
function format(n){return Math.round(n).toLocaleString()+"원"}

function calc(){

  let type = document.getElementById("type").value;
  let capital = parseFloat(document.getElementById("capital").value.replace(/,/g,''))||0;
  let dense = document.getElementById("dense").value==="true";

  let tax = 40200;
  let applyDense = dense && (type==="법인설립"||type==="자본금증자"||type==="본점주소이전_관외");

  if(type==="법인설립"||type==="자본금증자"||type==="본점주소이전_관외"){
    if(capital<=0){
      document.getElementById("total").innerText="자본금을 입력하세요";
      document.getElementById("detail").innerHTML="";
      return;
    }
    let base=Math.max(capital*0.004,112500);
    tax=base*(applyDense?3:1);
  }

  let edu = tax*0.2;
  let lawFee = (type==="법인설립"||type==="자본금증자") ? 300000 : 150000;
  let lawVAT = lawFee*0.1;
  let court = (type==="법인설립"||type==="본점주소이전_관외") ? 35000 : 7000;
  let stamp = (type==="법인설립"||type==="상호변경") ? 30000 : 0;

  let notar1 = 0;
  let notar2 = 0;

  if(type==="본점주소이전_관외"){
    notar1 = 100000;
    notar2 = 150000;
  }

  let extra = 10000;

  let total = tax+edu+lawFee+lawVAT+court+stamp+notar1+notar2+extra;

  document.getElementById("total").innerText = "총 비용: " + format(total);

  document.getElementById("detail").innerHTML = `
  등록세: ${format(tax)}<br>
  교육세: ${format(edu)}<br>
  법무사: ${format(lawFee)}<br>
  부가세: ${format(lawVAT)}<br>
  공증대행: ${format(notar1)}<br>
  공증료: ${format(notar2)}<br>
  수수료: ${format(court)}<br>
  도장: ${format(stamp)}<br>
  제증명: ${format(extra)}
  `;
}

function call(){
  location.href="tel:0324251500";
}

document.querySelectorAll("#type,#capital,#dense").forEach(el=>{
  el.addEventListener("input",calc);
  el.addEventListener("change",calc);
});

document.getElementById("capital").addEventListener("input",function(){
  let v=this.value.replace(/,/g,'');
  this.value=v.replace(/\B(?=(\d{3})+(?!\d))/g,",");
});

calc();
</script>

</body>
</html>
