<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부동산 취득세 계산기</title>
    <style>
        :root {
            --primary-color: #bfa15f; /* 골드 포인트 컬러 */
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e1e4e6;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #222;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fff;
        }

        /* 가액 입력란 분리 및 강조 디자인 */
        .price-container {
            background-color: #fffdf7;
            border: 1.5px solid var(--primary-color);
            border-radius: 10px;
            padding: 15px;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .quick-btn {
            flex: 1;
            background-color: #eee;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #f0f7ff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d0e3ff;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* 결과 창 디자인 */
        .result-container {
            margin-top: 25px;
            background-color: #f9fafb;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result-row.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed var(--border-color);
            font-size: 18px;
            font-weight: bold;
            color: #d9534f;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>부동산 취득세 계산기</h2>

    <!-- 1. 취득 원인 -->
    <div class="form-group">
        <label for="reason">취득 원인 선택</label>
        <select id="reason" onchange="toggleOptions()">
            <option value="sale">매매 / 유상취득</option>
            <option value="inheritance">상속</option>
            <option value="gift">증여</option>
            <option value="divorce">이혼 / 재산분할</option>
        </select>
    </div>

    <!-- 2. 가액 입력란 (별도 분리 및 강조) -->
    <div class="form-group price-container">
        <label for="price" style="color: #8a6d29;">거래 가액 또는 시가표준액 (원)</label>
        <input type="text" id="price" value="600,000,000" onkeyup="formatAndCalculate(this)">
        <div class="quick-buttons">
            <button class="quick-btn" onclick="addPrice(100000000)">+ 1억</button>
            <button class="quick-btn" onclick="addPrice(500000000)">+ 5억</button>
            <button class="quick-btn" onclick="addPrice(1000000000)">+ 10억</button>
            <button class="quick-btn" onclick="resetPrice()" style="background-color: #f5c6cb; color: #721c24;">정전</button>
        </div>
    </div>

    <!-- 3. 전용 면적 -->
    <div class="form-group">
        <label for="area">전용 면적</label>
        <select id="area" onchange="calculateTax()">
            <option value="under">85제곱미터 이하 (국민주택규모)</option>
            <option value="over">85제곱미터 초과</option>
        </select>
    </div>

    <!-- 4. 조건부 입력란: 상속 무주택 특례 -->
    <div class="form-group hidden" id="inheritance-option">
        <div class="checkbox-group">
            <input type="checkbox" id="homeless" onchange="calculateTax()">
            <label for="homeless" style="margin-bottom: 0; cursor: pointer; color: #004085;">
                상속인 세대 기준 무주택자 여부 (1가구 1주택 2% 감면 특례)
            </label>
        </div>
    </div>

    <!-- 세액 출력 구역 -->
    <div class="result-container">
        <div class="result-row">
            <span>취득세율</span>
            <span id="rate-view">1.00%</span>
        </div>
        <div class="result-row">
            <span>취득세액</span>
            <span id="tax-view">6,000,000 원</span>
        </div>
        <div class="result-row">
            <span>지방교육세액</span>
            <span id="edu-view">600,000 원</span>
        </div>
        <div class="result-row">
            <span>농어촌특별세액</span>
            <span id="rural-view">0 원 (면제)</span>
        </div>
        <div class="result-row total">
            <span>총 합계 세액</span>
            <span id="total-view">6,600,000 원</span>
        </div>
    </div>
</div>

<script>
    // 콤마 포맷팅 함수
    function numToComma(num) {
        return num.toString().replace(/\B(?=(\d3)+(?!\d))/g, ",");
    }
    function commaToNum(str) {
        return parseInt(str.replace(/,/g, '')) || 0;
    }

    function formatAndCalculate(input) {
        let num = commaToNum(input.value);
        input.value = numToComma(num);
        calculateTax();
    }

    function addPrice(amount) {
        let priceInput = document.getElementById('price');
        let current = commaToNum(priceInput.value);
        priceInput.value = numToComma(current + amount);
        calculateTax();
    }

    function resetPrice() {
        document.getElementById('price').value = "0";
        calculateTax();
    }

    function toggleOptions() {
        let reason = document.getElementById('reason').value;
        let inhOption = document.getElementById('inheritance-option');
        
        if (reason === 'inheritance') {
            inhOption.classList.remove('hidden');
        } else {
            inhOption.classList.add('hidden');
            document.getElementById('homeless').checked = false;
        }
        calculateTax();
    }

    // 핵심 세액 연산 로직
    function calculateTax() {
        let reason = document.getElementById('reason').value;
        let price = commaToNum(document.getElementById('price').value);
        let area = document.getElementById('area').value;
        let isHomeless = document.getElementById('homeless').checked;

        let taxRate = 0;
        let eduRate = 0;
        let ruralRate = 0;

        if (reason === 'sale') {
            // 매매 기본 1주택 슬라이딩 주택세율 기준 단순화 계산
            if (price <= 600000000) taxRate = 0.01;
            else if (price <= 900000000) taxRate = (price * (2 / 300000000) - 3) / 100;
            else taxRate = 0.03;
            eduRate = taxRate * 0.1;
        } else if (reason === 'inheritance') {
            if (isHomeless) {
                taxRate = 0.003; // 2% 감면 특례
                eduRate = 0.0006;
                ruralRate = (area === 'under') ? 0 : 0.0006;
            } else {
                taxRate = 0.023;
                eduRate = 0.002;
                ruralRate = (area === 'under') ? 0 : 0.003;
            }
        } else if (reason === 'gift') {
            taxRate = 0.035;
            eduRate = 0.003;
            ruralRate = (area === 'under') ? 0 : 0.002;
        } else if (reason === 'divorce') {
            taxRate = 0.015;
            eduRate = 0.003;
            ruralRate = (area === 'under') ? 0 : 0.002;
        }

        // 국민주택규모(85이하)일 경우 기본 농특세 면제 매칭
        if (area === 'under' && !isHomeless) {
            ruralRate = 0;
        }

        let tax = Math.floor(price * taxRate);
        let edu = Math.floor(price * eduRate);
        let rural = Math.floor(price * ruralRate);
        let total = tax + edu + rural;

        // 화면 뷰어 업데이트
        document.getElementById('rate-view').innerText = (taxRate * 100).toFixed(2) + "%";
        document.getElementById('tax-view').innerText = numToComma(tax) + " 원";
        document.getElementById('edu-view').innerText = numToComma(edu) + " 원";
        document.getElementById('rural-view').innerText = rural === 0 ? "0 원 (면제)" : numToComma(rural) + " 원";
        document.getElementById('total-view').innerText = numToComma(total) + " 원";
    }

    // 초기 실행
    window.onload = function() {
        calculateTax();
    }
</script>
</body>
</html>
